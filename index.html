<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90Plus | 축구 그 이상의 가치</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#d4ff00',
                        darkbg: '#0b0f19',
                        cardbg: '#161e31',
                        cardhover: '#1e2942',
                        bordercolor: '#242f4d',
                        mutedtext: '#94a3b8',
                        darkgray: '#64748b'
                    }
                }
            }
        }
    </script>
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950">

    <div class="app-container">
        <!-- HEADER -->
        <header class="bg-darkbg border-b border-bordercolor sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-1.5">
                <span class="text-brand font-black text-2xl tracking-tighter">90 plus</span>
                <span class="text-brand font-bold text-lg select-none">+</span>
            </div>
            
            <div class="flex items-center gap-4 text-white">
                <!-- Search Button -->
                <button id="btn-search-toggle" class="hover:text-brand transition-colors p-1" aria-label="검색">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="none" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
                <!-- Notification Button -->
                <button id="btn-notify" class="hover:text-brand transition-colors p-1 relative" aria-label="알림">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                    </svg>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-brand rounded-full"></span>
                </button>
                <!-- Settings Button -->
                <button id="btn-settings" class="hover:text-brand transition-colors p-1" aria-label="설정">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </button>
                <!-- Profile / Auth Button -->
                <button id="btn-auth-toggle" class="hover:text-brand transition-colors p-1" aria-label="프로필">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- SEARCH BAR (COLLAPSIBLE) -->
        <div id="search-bar-container" class="hidden bg-darkbg border-b border-bordercolor p-4 transition-all duration-300">
            <div class="relative flex items-center">
                <input type="text" id="search-input" placeholder="키워드나 팀, 기자를 검색하세요..." 
                       class="w-full bg-cardbg text-white border border-bordercolor rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:border-brand transition-colors">
                <svg class="w-5 h-5 text-darkgray absolute left-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <button id="btn-search-clear" class="absolute right-3 text-darkgray hover:text-white hidden">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- DYNAMIC TOP NAVIGATION (TABS / FILTER) -->
        <nav id="top-nav" class="bg-darkbg border-b border-bordercolor overflow-x-auto no-scrollbar py-3 px-4 sticky top-[53px] z-30">
            <!-- 탭 종류에 따라 동적으로 내용이 교체되거나 노출됩니다 -->
            <div id="top-nav-content" class="flex gap-2"></div>
        </nav>

        <!-- MAIN FEED -->
        <main class="flex-1 px-4 py-5 mb-24 overflow-y-auto">
            <div id="tab-content" class="flex flex-col gap-4">
                <!-- Javascript를 통해 동적으로 각 탭의 콘텐츠가 마운트됩니다. -->
            </div>
        </main>

        <!-- FOOTER BOTTOM TAB BAR -->
        <footer class="fixed bottom-0 left-0 right-0 bg-darkbg border-t border-bordercolor py-2.5 z-40">
            <div class="max-w-[600px] mx-auto flex justify-around items-center text-xs">
                <!-- 뉴스 탭 -->
                <button id="tab-news" class="flex flex-col items-center gap-1 text-brand font-bold py-1 px-4 rounded-xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 4a2 2 0 012 2v7a2 2 0 01-2 2H9a2 2 0 01-2-2v-1"></path>
                    </svg>
                    <span class="text-[11px]">뉴스</span>
                </button>
                <!-- 리그 탭 -->
                <button id="tab-leagues" class="flex flex-col items-center gap-1 text-darkgray hover:text-white transition-colors py-1 px-4 rounded-xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path>
                    </svg>
                    <span class="font-medium text-[11px]">리그</span>
                </button>
                <!-- MY(팔로잉) 탭 -->
                <button id="tab-following" class="flex flex-col items-center gap-1 text-darkgray hover:text-white transition-colors py-1 px-4 rounded-xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                    </svg>
                    <span class="font-medium text-[11px]">팔로잉</span>
                </button>
            </div>
        </footer>
    </div>

    <!-- AUTH MODAL -->
    <div id="auth-backdrop" class="fixed inset-0 bg-black/80 backdrop-blur-md opacity-0 visibility-hidden transition-all duration-300 z-50 flex items-center justify-center p-4">
        <div class="bg-cardbg border border-bordercolor w-full max-w-sm rounded-2xl p-6 relative shadow-2xl glass-effect">
            <!-- Close Button -->
            <button id="btn-close-auth" class="absolute top-4 right-4 text-darkgray hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            
            <!-- Tab Headers -->
            <div class="flex border-b border-bordercolor mb-6" id="auth-tab-container">
                <button id="auth-tab-login" class="flex-1 pb-3 text-sm font-extrabold border-b-2 border-brand text-brand">로그인</button>
                <button id="auth-tab-signup" class="flex-1 pb-3 text-sm font-extrabold border-b-2 border-transparent text-mutedtext hover:text-white">회원가입</button>
            </div>
            
            <!-- Login Form -->
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">닉네임</label>
                    <input type="text" id="login-nickname" placeholder="닉네임 입력" required
                           class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">비밀번호</label>
                    <input type="password" id="login-password" placeholder="••••••••" required
                           class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                </div>
                <button type="submit" class="w-full bg-brand text-black font-extrabold py-3 rounded-xl text-sm transition-all hover:shadow-lg hover:shadow-brand/20 active:scale-[0.98]">로그인</button>
            </form>
            
            <!-- Signup Form (Hidden initially) -->
            <form id="form-signup" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">닉네임</label>
                    <input type="text" id="signup-name" placeholder="닉네임 입력" required
                           class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">선호 축구팀 (프리미어리그)</label>
                    <select id="signup-fav-team" class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                        <option value="">선택 안함</option>
                        <option value="아스날">아스날</option>
                        <option value="맨시티">맨시티</option>
                        <option value="맨유">맨유</option>
                        <option value="애스턴 빌라">애스턴 빌라</option>
                        <option value="리버풀">리버풀</option>
                        <option value="본머스">본머스</option>
                        <option value="선덜랜드">선덜랜드</option>
                        <option value="브라이턴">브라이턴</option>
                        <option value="브렌트퍼드">브렌트퍼드</option>
                        <option value="첼시">첼시</option>
                        <option value="풀럼">풀럼</option>
                        <option value="뉴캐슬">뉴캐슬</option>
                        <option value="에버턴">에버턴</option>
                        <option value="리즈 유나이티드">리즈 유나이티드</option>
                        <option value="크리스털 팰리스">크리스털 팰리스</option>
                        <option value="노팅엄 포레스트">노팅엄 포레스트</option>
                        <option value="토트넘">토트넘</option>
                        <option value="웨스트 햄">웨스트 햄</option>
                        <option value="번리">번리</option>
                        <option value="울브스">울브스</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">비밀번호</label>
                    <input type="password" id="signup-password" placeholder="6자리 이상" minlength="6" required
                           class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                </div>
                <button type="submit" class="w-full bg-brand text-black font-extrabold py-3 rounded-xl text-sm transition-all hover:shadow-lg hover:shadow-brand/20 active:scale-[0.98]">회원가입</button>
            </form>

            <!-- User Info (Hidden initially, shown when logged in) -->
            <div id="auth-user-info" class="hidden text-center space-y-4">
                <div class="w-16 h-16 bg-brand/10 border border-brand/20 rounded-full flex items-center justify-center text-brand text-2xl font-black mx-auto" id="user-avatar">
                    U
                </div>
                <div>
                    <h3 id="user-display-name" class="text-white font-extrabold text-lg">사용자님</h3>
                    <p id="user-display-email" class="text-xs text-mutedtext mt-1">user@example.com</p>
                    <span id="user-admin-badge" class="hidden mt-2 inline-block px-2.5 py-0.5 bg-brand text-black font-black text-[10px] rounded-full">ADMIN</span>
                </div>

                <!-- 선호팀 변경 섹션 -->
                <div class="text-left bg-darkbg/50 border border-bordercolor rounded-xl p-3 space-y-2 mx-1">
                    <label class="block text-[11px] font-bold text-brand">My 선호 축구팀 설정/변경</label>
                    <div class="flex gap-2">
                        <select id="user-profile-fav-team" class="flex-1 bg-cardbg text-white border border-bordercolor rounded-lg py-1.5 px-2 text-xs focus:outline-none focus:border-brand transition-colors">
                            <option value="">선택 안함</option>
                            <option value="아스날">아스날</option>
                            <option value="맨시티">맨시티</option>
                            <option value="맨유">맨유</option>
                            <option value="애스턴 빌라">애스턴 빌라</option>
                            <option value="리버풀">리버풀</option>
                            <option value="본머스">본머스</option>
                            <option value="선덜랜드">선덜랜드</option>
                            <option value="브라이턴">브라이턴</option>
                            <option value="브렌트퍼드">브렌트퍼드</option>
                            <option value="첼시">첼시</option>
                            <option value="풀럼">풀럼</option>
                            <option value="뉴캐슬">뉴캐슬</option>
                            <option value="에버턴">에버턴</option>
                            <option value="리즈 유나이티드">리즈 유나이티드</option>
                            <option value="크리스털 팰리스">크리스털 팰리스</option>
                            <option value="노팅엄 포레스트">노팅엄 포레스트</option>
                            <option value="토트넘">토트넘</option>
                            <option value="웨스트 햄">웨스트 햄</option>
                            <option value="번리">번리</option>
                            <option value="울브스">울브스</option>
                        </select>
                        <button id="btn-update-fav-team" type="button" class="bg-brand text-black text-xs font-black px-3 py-1.5 rounded-lg transition-all hover:bg-brand/80 active:scale-95">변경</button>
                    </div>
                </div>
                
                <div class="pt-4 border-t border-bordercolor space-y-2">
                    <button id="btn-admin-panel" class="hidden w-full bg-cardhover text-white border border-bordercolor hover:border-brand/50 font-bold py-2.5 rounded-xl text-xs transition-all">
                        🛡️ 관리자 대시보드 열기
                    </button>
                    <button id="btn-logout" class="w-full bg-red-500/10 border border-red-500/20 text-red-400 font-bold py-2.5 rounded-xl text-xs transition-all hover:bg-red-500/20">
                        로그아웃
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL MODAL -->
    <div id="admin-backdrop" class="fixed inset-0 bg-black/90 backdrop-blur-md opacity-0 visibility-hidden transition-all duration-300 z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-cardbg border border-bordercolor w-full max-w-lg rounded-2xl p-6 relative shadow-2xl glass-effect my-8 max-h-[90vh] overflow-y-auto">
            <!-- Close Button -->
            <button id="btn-close-admin" class="absolute top-4 right-4 text-darkgray hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>

            <h2 class="text-xl font-black text-white mb-6 flex items-center gap-2">
                <span class="text-brand">🛡️</span> 90PLUS⁺ 관리자 콘솔
            </h2>

            <!-- Gemini API Key Section -->
            <div class="bg-darkbg/50 border border-bordercolor rounded-xl p-4 mb-6">
                <label class="block text-xs font-bold text-brand mb-1.5">🔑 Google Gemini API Key</label>
                <div class="flex gap-2">
                    <input type="password" id="gemini-api-key" placeholder="AI 본문 생성을 위해 Gemini API 키를 입력하세요..." 
                           class="flex-1 bg-darkbg text-white border border-bordercolor rounded-xl py-2 px-3 text-xs focus:outline-none focus:border-brand transition-colors">
                    <button id="btn-save-key" class="bg-brand text-black text-xs font-black px-4 py-2 rounded-xl transition-all hover:shadow-md hover:shadow-brand/20">저장</button>
                </div>
                <p class="text-[10px] text-mutedtext mt-2">※ 입력하신 API Key는 로컬 브라우저(LocalStorage)에만 안전하게 보관되며, 서버로 전송되지 않습니다. <a href="https://aistudio.google.com/" target="_blank" class="text-brand underline">Gemini API 키 발급받기</a></p>
            </div>

            <!-- Tab Headers for Admin Functions -->
            <div class="flex border-b border-bordercolor mb-6 text-xs font-bold">
                <button id="admin-tab-write" class="flex-1 pb-3 border-b-2 border-brand text-brand">✍️ AI 뉴스 작성</button>
                <button id="admin-tab-transfer" class="flex-1 pb-3 border-b-2 border-transparent text-mutedtext hover:text-white">🚨 이적 등록</button>
                <button id="admin-tab-match-result" class="flex-1 pb-3 border-b-2 border-transparent text-mutedtext hover:text-white">⚽ 경기 결과 등록</button>
            </div>

            <!-- Form 1: AI News Writer -->
            <form id="form-admin-news" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">기사 제목</label>
                    <input type="text" id="admin-news-title" placeholder="예) 손흥민 멀티골 작렬, 토트넘 빌라 격파" required
                           class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">카테고리</label>
                    <select id="admin-news-category" class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                        <option value="최신뉴스">최신뉴스</option>
                        <option value="이적소식">이적소식</option>
                        <option value="경기결과">경기결과</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">관련 팀 태그 (선호팀 피드 연동)</label>
                    <select id="admin-news-tag" class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:border-brand transition-colors">
                        <option value="">선택 안함</option>
                        <option value="아스날">아스날</option>
                        <option value="맨시티">맨시티</option>
                        <option value="맨유">맨유</option>
                        <option value="애스턴 빌라">애스턴 빌라</option>
                        <option value="리버풀">리버풀</option>
                        <option value="본머스">본머스</option>
                        <option value="선덜랜드">선덜랜드</option>
                        <option value="브라이턴">브라이턴</option>
                        <option value="브렌트퍼드">브렌트퍼드</option>
                        <option value="첼시">첼시</option>
                        <option value="풀럼">풀럼</option>
                        <option value="뉴캐슬">뉴캐슬</option>

            <!-- Form 2: Direct Transfer Registration -->
            <form id="form-admin-transfer" class="space-y-4 hidden">

                    </div>
                    <div>
                        <label class="block text-xs font-bold text-mutedtext mb-1.5">이적료</label>
                        <input type="text" id="transfer-cost" placeholder="예) €100M" required

                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-mutedtext mb-1.5">이전 구단 (From)</label>

                    <div>
                        <label class="block text-xs font-bold text-mutedtext mb-1.5">이적 구단 (To)</label>

                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-mutedtext mb-1.5">보도 기자</label>
                        <input type="text" id="transfer-reporter" placeholder="예) Fabrizio Romano" required
                               class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-xs focus:outline-none focus:border-brand transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-mutedtext mb-1.5">기자 Tier (1~5)</label>
                        <select id="transfer-tier" class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-xs focus:outline-none focus:border-brand transition-colors">
                            <option value="1">Tier 1 (매우 높음)</option>
                            <option value="2">Tier 2 (높음)</option>
                            <option value="3">Tier 3 (보통)</option>
                            <option value="4">Tier 4 (낮음)</option>
                            <option value="5">Tier 5 (지라시)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">관련 팀 태그 (선호팀 피드 연동)</label>
                    <select id="transfer-tag" class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2.5 px-4 text-xs focus:outline-none focus:border-brand transition-colors">
                        <option value="">선택 안함</option>
                        <option value="아스날">아스날</option>

                <button type="submit" class="w-full bg-[#ff9f00] text-black font-extrabold py-3.5 rounded-xl text-sm transition-all hover:shadow-lg hover:shadow-[#ff9f00]/20 active:scale-[0.98]">

                            <option value="브렌트퍼드">브렌트퍼드</option>
                            <option value="첼시">첼시</option>
                            <option value="풀럼">풀럼</option>
                            <option value="뉴캐슬">뉴캐슬</option>
                            <option value="에버턴">에버턴</option>
                            <option value="리즈 유나이티드">리즈 유나이티드</option>
                            <option value="크리스털 팰리스">크리스털 팰리스</option>
                            <option value="노팅엄 포레스트">노팅엄 포레스트</option>
                            <option value="토트넘">토트넘</option>
                            <option value="웨스트 햄">웨스트 햄</option>
                            <option value="번리">번리</option>
                            <option value="울브스">울브스</option>
                        </select>
                        <input type="number" id="match-home-score" min="0" placeholder="0" required
                               class="w-full text-center bg-cardbg text-white border border-bordercolor rounded-xl py-2.5 text-base font-black focus:outline-none focus:border-brand transition-colors">
                    </div>
                    <!-- 원정 팀 -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-red-400 text-center">원정 팀 (Away)</label>
                        <select id="match-away-team" class="w-full bg-cardbg text-white border border-bordercolor rounded-xl py-2 px-3 text-xs focus:outline-none focus:border-brand transition-colors">
                            <option value="리버풀">리버풀</option>
                            <option value="아스날">아스날</option>
                            <option value="맨시티">맨시티</option>
                            <option value="맨유">맨유</option>
                            <option value="애스턴 빌라">애스턴 빌라</option>
                            <option value="본머스">본머스</option>
                            <option value="선덜랜드">선덜랜드</option>
                            <option value="브라이턴">브라이턴</option>
                            <option value="브렌트퍼드">브렌트퍼드</option>
                            <option value="첼시">첼시</option>
                            <option value="풀럼">풀럼</option>
                            <option value="뉴캐슬">뉴캐슬</option>
                            <option value="에버턴">에버턴</option>
                            <option value="리즈 유나이티드">리즈 유나이티드</option>
                            <option value="크리스털 팰리스">크리스털 팰리스</option>
                            <option value="노팅엄 포레스트">노팅엄 포레스트</option>
                            <option value="토트넘">토트넘</option>
                            <option value="웨스트 햄">웨스트 햄</option>
                            <option value="번리">번리</option>
                            <option value="울브스">울브스</option>
                        </select>
                        <input type="number" id="match-away-score" min="0" placeholder="0" required
                               class="w-full text-center bg-cardbg text-white border border-bordercolor rounded-xl py-2.5 text-base font-black focus:outline-none focus:border-brand transition-colors">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-mutedtext mb-1.5">세부 득점자 / 간단 코멘트 (옵션)</label>
                    <textarea id="match-comment" rows="2" placeholder="예) 아스날: 사카 45' (PK) | 리버풀: 살라 72' (도움: 누녜스)"
                              class="w-full bg-darkbg text-white border border-bordercolor rounded-xl py-2 px-3 text-xs focus:outline-none focus:border-brand transition-colors resize-none"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-brand text-black font-extrabold py-3.5 rounded-xl text-sm transition-all hover:shadow-lg hover:shadow-brand/20 active:scale-[0.98]">
                    ⚽ 경기 결과 등록 발행
                </button>
            </form>
        </div>
    </div>

    <!-- DETAILS DRAWER (BOTTOM SHEET) -->
    <div id="backdrop" class="bottom-sheet-backdrop"></div>
    <div id="bottom-sheet" class="bottom-sheet">
        <!-- Drawer Handle -->
        <div class="flex justify-center py-3.5 cursor-pointer" id="btn-close-sheet-drag">
            <div class="w-12 h-1.5 bg-gray-700 rounded-full"></div>
        </div>
        <!-- Drawer Contents -->
        <div class="px-6 pb-8 overflow-y-auto max-h-[80vh]" id="bottom-sheet-content">
            <!-- 뉴스 세부 콘텐츠가 동적으로 삽입됩니다. -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
